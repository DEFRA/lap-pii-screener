sonar.projectKey=DEFRA_lap-pii-screener
sonar.organization=defra

sonar.projectName=lap-pii-screener
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=src
sonar.exclusions=\
  src/.venv/**,\
  src/**/__pycache__/**,\
  src/**/*.egg-info/**,\
  tests/fixtures/**

# Test paths (SonarCloud separates coverage for source vs test code)
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py
# Fixtures are intentionally seeded with fake secrets/PII for scanner testing;
# exclude them from analysis so the deliberate test data is not flagged.
sonar.test.exclusions=tests/fixtures/**

# Coverage report produced by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Python version
sonar.python.version=3.11,3.12
