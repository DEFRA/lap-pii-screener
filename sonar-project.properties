sonar.projectKey=DEFRA_lap-pii-screener
sonar.organization=defra

sonar.projectName=lap-pii-screener
sonar.projectVersion=0.1.0

# Source directories
sonar.sources=src
sonar.exclusions=\
  src/.venv/**,\
  src/**/__pycache__/**,\
  src/**/*.egg-info/**,\
  tests/fixtures/**

# Test paths (SonarCloud separates coverage for source vs test code)
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py
# Fixtures are intentionally seeded with fake secrets/PII for scanner testing;
# exclude them from analysis so the deliberate test data is not flagged.
sonar.test.exclusions=tests/fixtures/**

# Coverage report produced by pytest-cov
sonar.python.coverage.reportPaths=coverage.xml

# Python version
sonar.python.version=3.11

# ── Issue suppressions ────────────────────────────────────────────────────────
# A few findings are deliberate, documented design decisions that cannot be
# "fixed" without breaking required behaviour. Suppress them at project level
# (inline # NOSONAR is not reliably honoured for this project).
sonar.issue.ignore.multicriteria=e1,e2

# semgrep ruleset download: SSL/TLS verification is disabled ONLY when the
# operator explicitly opts in via SEMGREP_RULES_SSL_VERIFY=false (e.g. behind a
# corporate TLS-intercepting proxy). The risk is deliberately accepted and a
# warning is printed, so hostname verification cannot be enforced here.
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5527
sonar.issue.ignore.multicriteria.e1.resourceKey=src/scanners/semgrep_scanner.py

# `scan` is a Typer CLI command; each parameter is a distinct user-facing CLI
# option, so the parameter count cannot be reduced without breaking the CLI.
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=src/cli.py
